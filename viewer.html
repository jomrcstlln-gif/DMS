<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Document Viewer</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<!-- Sidebar & Top Nav same as others -->
<aside class="sidebar" id="sidebar">
  <div class="logo">Enterprise DMS</div>
  <nav class="nav">
    <ul>
      <li data-page="index"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li data-page="documents"><i class="fas fa-folder"></i> Documents</li>
      <li data-page="upload"><i class="fas fa-upload"></i> Upload</li>
      <li data-page="settings"><i class="fas fa-cog"></i> Settings</li>
    </ul>
  </nav>
</aside>

<div class="main">
  <header class="top-nav">
    <div class="breadcrumbs" id="breadcrumbs">Viewer</div>
  </header>
  <section class="content" id="viewer-section">
    <div class="document-preview" id="document-preview">
      <p>Loading document...</p>
    </div>
    <div class="document-details" id="document-details"></div>
  </section>
</div>

<script src="js/app.js"></script>
</body>
</html>
