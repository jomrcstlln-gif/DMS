<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise DMS - Dashboard</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<!-- Sidebar Navigation -->
<aside class="sidebar" id="sidebar">
  <div class="logo">Enterprise DMS</div>
  <nav class="nav">
    <ul>
      <li class="active" data-page="index"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li data-page="documents"><i class="fas fa-folder"></i> Documents</li>
      <li data-page="upload"><i class="fas fa-upload"></i> Upload</li>
      <li data-page="settings"><i class="fas fa-cog"></i> Settings</li>
    </ul>
  </nav>
</aside>

<!-- Main Content -->
<div class="main">
  <!-- Top Navbar -->
  <header class="top-nav">
    <div class="breadcrumbs" id="breadcrumbs">Home</div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search documents..." />
      <button id="search-btn"><i class="fas fa-search"></i></button>
    </div>
  </header>

  <!-- Dashboard Stats -->
  <section class="dashboard">
    <div class="cards">
      <div class="card" id="stats-total">
        <h3>Total Documents</h3>
        <div class="value" id="total-count">0</div>
      </div>
      <div class="card" id="stats-categories">
        <h3>Categories</h3>
        <ul id="category-list"></ul>
      </div>
      <div class="card" id="stats-recent">
        <h3>Recent Documents</h3>
        <ul id="recent-docs"></ul>
      </div>
    </div>
  </section>
</div>

<!-- Loader -->
<div id="loading" class="loader hide">
  <div class="spinner"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
