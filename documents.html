<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Documents - Enterprise DMS</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<!-- Sidebar & Top Nav same as index.html -->
<aside class="sidebar" id="sidebar">
  <div class="logo">Enterprise DMS</div>
  <nav class="nav">
    <ul>
      <li data-page="index"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li class="active" data-page="documents"><i class="fas fa-folder"></i> Documents</li>
      <li data-page="upload"><i class="fas fa-upload"></i> Upload</li>
      <li data-page="settings"><i class="fas fa-cog"></i> Settings</li>
    </ul>
  </nav>
</aside>

<div class="main">
  <header class="top-nav">
    <div class="breadcrumbs" id="breadcrumbs">Documents</div>
  </header>

  <section class="content" id="documents-section">
    <div class="filters">
      <select id="category-filter">
        <option value="">All Categories</option>
      </select>
      <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="Active">Active</option>
        <option value="Archived">Archived</option>
      </select>
    </div>

    <div class="table-container">
      <table id="documents-table">
        <thead>
          <tr>
            <th>Doc ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Department</th>
            <th>Type</th>
            <th>Size</th>
            <th>Upload Date</th>
            <th>Uploaded By</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>
</div>

<script src="js/app.js"></script>
</body>
</html>
