<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload Document</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<!-- Sidebar & Top Nav same as others -->
<aside class="sidebar" id="sidebar">
  <div class="logo">Enterprise DMS</div>
  <nav class="nav">
    <ul>
      <li data-page="index"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li data-page="documents"><i class="fas fa-folder"></i> Documents</li>
      <li class="active" data-page="upload"><i class="fas fa-upload"></i> Upload</li>
      <li data-page="settings"><i class="fas fa-cog"></i> Settings</li>
    </ul>
  </nav>
</aside>

<div class="main">
  <header class="top-nav">
    <div class="breadcrumbs">Upload</div>
  </header>
  <section class="content" id="upload-section">
    <form id="upload-form" novalidate>
      <div class="form-group">
        <label for="doc-name">Document Name</label>
        <input type="text" id="doc-name" required />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" required></select>
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <input type="text" id="department" required />
      </div>
      <div class="form-group">
        <label for="file-type">File Type</label>
        <input type="text" id="file-type" required />
      </div>
      <div class="form-group">
        <label for="file-size">File Size (KB)</label>
        <input type="number" id="file-size" required />
      </div>
      <div class="form-group">
        <label for="upload-date">Upload Date</label>
        <input type="date" id="upload-date" required />
      </div>
      <div class="form-group">
        <label for="uploaded-by">Uploaded By</label>
        <input type="text" id="uploaded-by" required />
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" required>
          <option value="Active">Active</option>
          <option value="Archived">Archived</option>
        </select>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description"></textarea>
      </div>
      <div class="form-group">
        <label for="tags">Tags (comma separated)</label>
        <input type="text" id="tags" />
      </div>
      <div class="form-group">
        <label for="file-input">Select File</label>
        <input type="file" id="file-input" required />
      </div>
      <button type="submit">Upload Document</button>
      <div id="upload-message"></div>
    </form>
  </section>
</div>
<script src="js/app.js"></script>
</body>
</html>
