<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<!-- Sidebar & Top nav same as others -->
<aside class="sidebar" id="sidebar">
  <div class="logo">Enterprise DMS</div>
  <nav class="nav">
    <ul>
      <li data-page="index"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
      <li data-page="documents"><i class="fas fa-folder"></i> Documents</li>
      <li data-page="upload"><i class="fas fa-upload"></i> Upload</li>

<div class="main">

    <div class="breadcrumbs">Settings</div>

    <h2>Preferences</h2>

<script src="js/app.js"></script>
